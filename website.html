<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Webサイト制作物一覧 - プロジェクトアーカイブ</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <button class="hamburger" aria-label="メニュー">
    <span></span><span></span><span></span>
  </button>

  <div class="page-wrapper">
    <aside class="sidebar" data-nav-level="root"></aside>

    <main class="main-content">
      <header class="doc-header">
        <div class="doc-category">WEB SITES</div>
        <h1 class="doc-title">Webサイト制作物一覧</h1>
        <div class="doc-meta">
          <span><span class="material-symbols-outlined icon-sm">calendar_today</span> 作成日：2026-XX-XX</span>
          <span><span class="material-symbols-outlined icon-sm">person</span> 作成者：（氏名を入力）</span>
          <span><span class="material-symbols-outlined icon-sm">push_pin</span> Ver 1.0</span>
        </div>
      </header>

      <div class="doc-body">
        <a class="back-to-top-link" href="./index.html">
          <span class="material-symbols-outlined">arrow_back</span>
          トップに戻る
        </a>

        <section class="section" id="website-work">
          <h2 class="section-title"><span class="section-icon"><span class="material-symbols-outlined">language</span></span> 作った成果物</h2>

          <div class="fill-hint">このページに、Webサイトの成果物を 1. から順番に追加していけます。</div>

          <div class="work-list">
            <article class="work-item">
              <div class="work-number">1.</div>
              <div class="work-content">
                <div class="fill-block">
                  <div class="fill-label">タイトル</div>
                  <div class="fill-content"><p>佐藤クリニック</p></div>
                </div>

                <div class="fill-block">
                  <div class="fill-label">説明</div>
                  <div class="fill-content"><p>（説明を入力）</p></div>
                </div>

                <div class="fill-block">
                  <div class="fill-label">URL</div>
                  <div class="fill-content">
                    <p><a href="https://202601-aw-abe-commits.github.io/Sato_Clinic/" target="_blank" rel="noopener noreferrer">https://202601-aw-abe-commits.github.io/Sato_Clinic/</a></p>
                  </div>
                </div>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="js/main.js"></script>
</body>
</html>
